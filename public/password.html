<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protected Link | Shortly</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="background-animation"></div>
  
  <div class="wrap password-wrap">
    <div class="password-container">
      <!-- Password Card -->
      <div class="password-card card">
        <div class="password-header">
          <div class="password-icon">
            <i class="fas fa-lock"></i>
          </div>
          <h2>Protected Link</h2>
          <p class="password-subtitle">This link is password protected. Enter the password to continue.</p>
        </div>
        
        <form id="pwForm" class="password-form">
          <div class="form-group">
            <label for="pw">
              <i class="fas fa-key"></i>
              Password
            </label>
            <div class="password-input-wrapper">
              <input 
                type="password" 
                id="pw" 
                placeholder="Enter password"
                required
                autocomplete="current-password"
                autofocus
              >
              <button type="button" id="togglePassword" class="toggle-password">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          
          <div class="form-actions">
            <button type="submit" class="submit-btn" id="submitBtn">
              <i class="fas fa-unlock"></i>
              Continue to Link
            </button>
            <a href="/" class="back-link">
              <i class="fas fa-arrow-left"></i>
              Back to Home
            </a>
          </div>
        </form>
        
        <div id="message" class="message hidden"></div>
        
        <div class="password-footer">
          <div class="footer-info">
            <i class="fas fa-info-circle"></i>
            <span>Need help? Contact the link owner for the password.</span>
          </div>
        </div>
      </div>
      
      <!-- Link Info -->
      <div class="link-info-card card">
        <h3 class="info-title">
          <i class="fas fa-shield-alt"></i>
          About Password Protection
        </h3>
        <ul class="info-list">
          <li>
            <i class="fas fa-check-circle"></i>
            <span>Secure access control for sensitive links</span>
          </li>
          <li>
            <i class="fas fa-check-circle"></i>
            <span>Password is encrypted and secure</span>
          </li>
          <li>
            <i class="fas fa-check-circle"></i>
            <span>Access logging and tracking enabled</span>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

<script>
// Get the short code from URL path
const pathParts = window.location.pathname.split('/').filter(p => p);
const shortCode = pathParts[pathParts.length - 1];

// DOM Elements
const form = document.getElementById('pwForm');
const passwordInput = document.getElementById('pw');
const togglePasswordBtn = document.getElementById('togglePassword');
const message = document.getElementById('message');
const toast = document.getElementById('toast');
const submitBtn = document.getElementById('submitBtn');

// Toast function
function showToast(messageText, type = 'info') {
  toast.textContent = messageText;
  toast.className = `toast ${type} show`;
  
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// Toggle password visibility
togglePasswordBtn.addEventListener('click', () => {
  const type = passwordInput.getAttribute('type');
  if (type === 'password') {
    passwordInput.setAttribute('type', 'text');
    togglePasswordBtn.innerHTML = '<i class="fas fa-eye-slash"></i>';
  } else {
    passwordInput.setAttribute('type', 'password');
    togglePasswordBtn.innerHTML = '<i class="fas fa-eye"></i>';
  }
  passwordInput.focus();
});

// Show message
function showMessage(text, type) {
  message.textContent = text;
  message.className = `message ${type}`;
  message.classList.remove('hidden');
  
  setTimeout(() => {
    message.classList.add('hidden');
  }, 5000);
}

// Form submission
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const password = passwordInput.value.trim();
  
  if (!password) {
    showMessage('Please enter a password', 'error');
    passwordInput.focus();
    return;
  }
  
  // Disable form and show loading
  const originalText = submitBtn.innerHTML;
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
  
  try {
    const response = await fetch(`/r/${shortCode}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ password }),
      redirect: 'manual'
    });
    
    // Check for redirect
    if (response.type === 'opaqueredirect' || response.status === 0) {
      // Redirect happened, follow it
      window.location.href = `/r/${shortCode}`;
      return;
    }
    
    if (response.redirected) {
      window.location.href = response.url;
      return;
    }
    
    const data = await response.json();
    
    if (response.status === 403) {
      showMessage('Incorrect password. Please try again.', 'error');
      passwordInput.value = '';
      passwordInput.focus();
      shakeForm();
    } else if (response.status === 410) {
      showMessage('This link has expired.', 'error');
    } else if (response.status === 404) {
      showMessage('Link not found.', 'error');
    } else if (response.ok) {
      showMessage('Access granted! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = `/r/${shortCode}`;
      }, 1000);
    } else {
      showMessage('An error occurred. Please try again.', 'error');
    }
    
  } catch (error) {
    console.error('Password verification error:', error);
    showMessage('Network error. Please check your connection.', 'error');
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = originalText;
  }
});

// Shake animation for form
function shakeForm() {
  form.classList.add('shake');
  setTimeout(() => {
    form.classList.remove('shake');
  }, 500);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    window.location.href = '/';
  }
});

// Check if link exists on load
async function checkLinkExists() {
  try {
    const response = await fetch(`/api/link/${shortCode}`);
    if (!response.ok) {
      if (response.status === 404) {
        showMessage('This link does not exist or has been deleted.', 'error');
      }
    }
  } catch (error) {
    console.error('Link check error:', error);
  }
}

// Initialize
window.addEventListener('load', () => {
  passwordInput.focus();
  checkLinkExists();
});
</script>

<style>

  min-height: 100vh;

}

  }

  padding: var(--space-xl);
}

  border-radius: 50%;

  align-items: center;
  justify-content: center;
}

.password-icon i {
  font-size: 2.5rem;
  color: #8B5CF6;

  font-size: 2rem;

}

  color: var(--text-secondary);

}

  margin-bottom: var(--space-xl);
}

  width: 100%;

  height: 36px;

  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast) var(--transition-bezier);
}

  background: #F1F5F9;
  color: var(--text-primary);
}

  display: flex;
  flex-direction: column;

  margin-top: var(--space-xl);
}

.submit-btn {
  width: 100%;
  padding: var(--space-md);
  background: linear-gradient(135deg, #8B5CF6, #6366F1);
  color: white;
  border: none;
  border-radius: var(--radius-md);

.submit-btn:hover:not(:disabled) {

}

}

.back-link {

}

.back-link:hover {

}

.message {

  border-radius: var(--radius-md);

}

}

}

  padding-top: var(--space-lg);
  border-top: 1px solid #E2E8F0;
  margin-top: var(--space-lg);
}

.footer-info {
  display: flex;
  align-items: center;

}

.link-info-card {
  align-self: start;
}

.info-title {
  font-size: 1.25rem;
  margin-bottom: var(--space-lg);
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.info-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.info-list li {
  display: flex;
  align-items: flex-start;

  margin-bottom: var(--space-md);
  color: var(--text-secondary);
}

.info-list li i {
  color: var(--success);
  margin-top: 2px;
  flex-shrink: 0;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }

}

.shake {
  animation: shake 0.5s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 767px) {
  .password-container {
    grid-template-columns: 1fr;
  }
  
  .password-card {
    padding: var(--space-lg);
  }
  
  .password-icon {
    width: 64px;
    height: 64px;
  }
  
  .password-icon i {
    font-size: 2rem;
  }
  
  .password-header h2 {
    font-size: 1.75rem;
  }
}
</style>
</body>
</html>
